name: Feth-i Alem APK Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Build tools kur
        run: |
          yes | sdkmanager "build-tools;33.0.2" "platforms;android-33"

      - name: Ayarları hazırla
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          cp /root/.local/share/godot/export_templates/4.2.2.stable/* \
            ~/.local/share/godot/export_templates/4.2.2.stable/

          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which java))))

          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/debug_keystore = "$(pwd)/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/java_sdk_path = "$JAVA_PATH"
          EOF

      - name: Keystore oluştur
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Export preset oluştur
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="FethiAlem.apk"
          encrypt_pck=false
          encrypt_directory=false
          [preset.0.options]
          architectures/arm64-v8a=true
          architectures/armeabi-v7a=false
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug="debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          package/unique_name="com.fethialem.game"
          package/name="Feth-i Alem"
          package/signed=true
          version/code=1
          version/name="0.1"
          EOF

      - name: APK derle
        run: godot --headless --export-debug "Android" FethiAlem.apk

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: FethiAlem-APK
          path: FethiAlem.apk
          retention-days: 30

name: 🎮 Build Android APK

on:
  push:
    branches: [main, open-world-mobile-v2]
  pull_request:
    branches: [main, open-world-mobile-v2]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;34.0.0 platforms;android-34'

      - name: 🔑 Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Feth-i Alem, O=Feth-i Alem Game, C=TR"
          echo "Keystore created"

      - name: ⚙️ Configure Project
        run: |
          # Disable editor plugins that might interfere with headless export
          sed -i 's|enabled=PackedStringArray("res://addons/gut/plugin.cfg")|enabled=PackedStringArray()|' project.godot
          echo "Editor plugins disabled"
          
          # Configure debug keystore in export_presets.cfg
          sed -i 's|keystore/debug=""|keystore/debug="/tmp/debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          echo "Export presets configured"
          grep "keystore" export_presets.cfg

      - name: ⬇️ Download Godot Executable and Templates
        run: |
          GODOT_EXECUTABLE_URL="https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip"
          GODOT_TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz"
          
          wget -O /tmp/Godot_v4.3-stable_linux.x86_64.zip "$GODOT_EXECUTABLE_URL"
          wget -O /tmp/Godot_v4.3-stable_export_templates.tpz "$GODOT_TEMPLATES_URL"
          
          mkdir -p ~/.local/share/godot/templates/4.3.stable
          unzip -o /tmp/Godot_v4.3-stable_export_templates.tpz -d ~/.local/share/godot/templates/4.3.stable
          echo "Godot executable and export templates downloaded and installed manually"

      - name: 🚀 Export Android APK (Manual)
        run: |
          unzip /tmp/Godot_v4.3-stable_linux.x86_64.zip -d /tmp/godot_exec
          chmod +x /tmp/godot_exec/Godot_v4.3-stable_linux.x86_64
          /tmp/godot_exec/Godot_v4.3-stable_linux.x86_64 --headless --export-debug Android FethiAlem.apk
          echo "APK Exported"

      - name: 📊 Show APK Info
        run: |
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found"
            exit 1
          fi
          cp "$APK_PATH" FethiAlem.apk
          echo "APK Information"
          file FethiAlem.apk
          ls -lh FethiAlem.apk
          
          unzip -l FethiAlem.apk 2>/dev/null | head -20

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FethiAlem-debug.apk
          path: FethiAlem.apk
          retention-days: 30

      - name: 📝 Create Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # 🎮 Feth-i Alem - Build
          
          ## 📱 APK Information
          - Build Type: Debug
          - Godot Version: 4.3
          
          ## 🎯 Game Features
          - 3D Open World Map
          - 30+ Cities
          - RTS Controls
          - Mobile UI with Joystick
          
          ## 🛠️ How to Install
          1. Download the APK
          2. Enable "Install from unknown sources" on your Android device
          3. Install the APK
          4. Enjoy!
          
          Built with ❤️ using Godot 4.3
          EOF
          cat RELEASE_NOTES.md

      - name: 📤 Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: Release-Notes
          path: RELEASE_NOTES.md

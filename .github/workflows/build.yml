name: Feth-i Alem APK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;34.0.0 platforms;android-34'

      - name: Install Godot 4.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/tpz
          cp /tmp/tpz/templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings with SDK paths
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<'HEREDOC'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          HEREDOC
          # Write SDK paths with shell expansion (no leading whitespace)
          {
            echo "export/android/android_sdk_path = \"$ANDROID_SDK_ROOT\""
            echo "export/android/java_sdk_path = \"$JAVA_HOME\""
            echo "export/android/debug_keystore = \"/tmp/debug.keystore\""
            echo "export/android/debug_keystore_user = \"androiddebugkey\""
            echo "export/android/debug_keystore_pass = \"android\""
          } >> ~/.config/godot/editor_settings-4.tres
          echo "--- Editor settings ---"
          cat ~/.config/godot/editor_settings-4.tres

      - name: Patch export_presets.cfg with keystore paths
        run: |
          sed -i 's|keystore/debug=""|keystore/debug="/tmp/debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          echo "--- export_presets.cfg ---"
          cat export_presets.cfg

      - name: Install Android build template
        run: |
          TEMPLATE_ZIP=~/.local/share/godot/export_templates/4.3.stable/android_source.zip
          if [ -f "$TEMPLATE_ZIP" ]; then
            mkdir -p android/build
            unzip -o "$TEMPLATE_ZIP" -d android/build/
            echo "Android build template installed successfully"
            ls -la android/build/
          else
            echo "ERROR: android_source.zip not found at $TEMPLATE_ZIP"
            echo "Available template files:"
            ls ~/.local/share/godot/export_templates/4.3.stable/
            exit 1
          fi

      - name: Import project resources
        run: |
          timeout 30 godot --headless --import 2>&1 || true
          echo "Import step completed"

      - name: Export Android APK
        run: |
          godot --headless --export-debug "Android" FethiAlem.apk 2>&1
          ls -la FethiAlem.apk

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FethiAlem-APK
          path: FethiAlem.apk
          if-no-files-found: warn

name: Feth-i Alem APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Ayarları hazırla
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable

          cp /root/.local/share/godot/export_templates/4.2.2.stable/* \
            ~/.local/share/godot/export_templates/4.2.2.stable/

          cp /root/.config/godot/editor_settings-4.tres \
            ~/.config/godot/editor_settings-4.tres

      - name: Export preset oluştur
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="FethiAlem.apk"
          encrypt_pck=false
          encrypt_directory=false
          [preset.0.options]
          architectures/arm64-v8a=true
          package/unique_name="com.fethialem.game"
          package/name="Feth-i Alem"
          version/code=1
          version/name="0.1"
          EOF

      - name: APK derle
        run: godot --headless --export-debug "Android" FethiAlem.apk

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: FethiAlem-APK
          path: FethiAlem.apk
          retention-days: 30

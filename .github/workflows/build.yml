name: Feth-i Alem APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;33.0.2 platforms;android-33'

      - name: Godot indir
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp
          cp /tmp/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/
          ls ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Config
        run: |
          mkdir -p ~/.config/godot
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="FethiAlem.apk"
          
          [preset.0.options]
          architectures/armeabi_v7a=false
          architectures/arm64_v8a=true
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug="debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          version/code=1
          version/name="0.1"
          package/unique_name="com.fethialem.game"
          package/name="Feth-i Alem"
          permissions/internet=true
          EOF
          
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$(dirname $(dirname $(readlink -f $(which java))))"
          EOF

      - name: Export
        run: godot --headless --export-debug "Android" FethiAlem.apk

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: FethiAlem-APK
          path: FethiAlem.apk
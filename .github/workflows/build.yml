name: Build Feth-i Alem

on:
  push:
    branches: [ main, feature/*, open-world-mobile-v2 ]
  pull_request:
    branches: [ main, feature/*, open-world-mobile-v2 ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /opt/android-sdk

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platform-tools
            ndk;26b

      - name: Verify Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "NDK paths:"
          ls -la $ANDROID_SDK_ROOT/ndk/ 2>/dev/null || echo "No NDK"
          echo "Build tools:"
          ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "No build-tools"
          echo "Platforms:"
          ls -la $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "No platforms"

      - name: Download Godot 4.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          godot --version

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O templates.tpz
          unzip -q templates.tpz -d templates_extracted
          cp -r templates_extracted/templates/* ~/.local/share/godot/export_templates/4.3.stable/
          ls ~/.local/share/godot/export_templates/4.3.stable/

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Feth-i Alem, O=Feth-i Alem Game, C=TR"

      - name: Configure Project
        run: |
          sed -i 's|enabled=PackedStringArray("res://addons/gut/plugin.cfg")|enabled=PackedStringArray()|' project.godot
          cat export_presets.cfg | sed \
            -e 's|keystore/debug=""|keystore/debug="/tmp/debug.keystore"|' \
            -e 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' \
            -e 's|keystore/debug_password=""|keystore/debug_password="android"|' \
            > export_presets.cfg.tmp && mv export_presets.cfg.tmp export_presets.cfg

      - name: Export Android APK
        id: export
        run: |
          echo "Exporting APK..."
          godot --headless --export-debug "Android" FethiAlem.apk 2>&1 | tee build.log
          if [ -f "FethiAlem.apk" ]; then
            echo "APK EXPORT SUCCESSFUL"
            ls -lh FethiAlem.apk
          else
            echo "APK export failed - checking log:"
            tail -100 build.log
            exit 1
          fi

      - name: Show APK Info
        run: |
          file FethiAlem.apk
          ls -lh FethiAlem.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FethiAlem-debug-apk
          path: FethiAlem.apk
          retention-days: 30
name: Feth-i Alem APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Godot 4 indir
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Export templates indir
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Keystore oluştur
        run: |
          keytool -genkey -v \
            -keystore $GITHUB_WORKSPACE/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Editor ayarları ve preset oluştur
        run: |
          mkdir -p ~/.config/godot
          
          cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/shutdown_adb_on_exit = true
          EOF

          cat > $GITHUB_WORKSPACE/export_presets.cfg << 'EOF'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="FethiAlem.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/export_format=0
          gradle_build/min_sdk=""
          gradle_build/target_sdk=""
          architectures/armeabi-v7a=false
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug="$GITHUB_WORKSPACE/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          package/unique_name="com.fethialem.game"
          package/name="Feth-i Alem"
          package/signed=true
          package/classify_as_game=true
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_as_launcher_app=false
          package/show_in_app_library=true
          package/meta_quest_system=false
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          xr_features/hand_tracking=0
          xr_features/hand_tracking_frequency=0
          xr_features/passthrough=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          version/code=1
          version/name="0.1"
          EOF

      - name: Android SDK path kontrol
        run: |
          echo "SDK Path: /usr/local/lib/android/sdk"
          ls /usr/local/lib/android/sdk || echo "SDK bulunamadı, alternatif path aranıyor..."
          find /usr -name "adb" 2>/dev/null | head -5
          find /opt -name "adb" 2>/dev/null | head -5

      - name: APK derle
        run: |
          cd $GITHUB_WORKSPACE
          godot --headless --export-debug "Android" FethiAlem.apk

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: FethiAlem-APK
          path: FethiAlem.apk
          retention-days: 30

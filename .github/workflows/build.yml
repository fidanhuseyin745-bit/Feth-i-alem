name: Feth-i Alem APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK kur
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;33.0.2 platforms;android-33'

      - name: Godot 4 indir
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Export templates indir
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Keystore oluştur
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Ayarları hazırla
        run: |
          mkdir -p ~/.config/godot
          JAVA_HOME_PATH=$(dirname $(dirname $(readlink -f $(which java))))
          SDK_ROOT="$ANDROID_SDK_ROOT"
          KS_PATH="$(pwd)/debug.keystore"

          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$SDK_ROOT"
          export/android/debug_keystore = "$KS_PATH"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/java_sdk_path = "$JAVA_HOME_PATH"
          EOF

          cat > export_presets.cfg << EOF
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="FethiAlem.apk"
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          architectures/arm64-v8a=true
          architectures/armeabi-v7a=false
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug="$KS_PATH"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          package/unique_name="com.fethialem.game"
          package/name="Feth-i Alem"
          package/signed=true
          version/code=1
          version/name="0.1"
          EOF

      - name: APK derle
        run: godot --headless --export-debug "Android" FethiAlem.apk

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: FethiAlem-APK
          path: FethiAlem.apk
          retention-days: 30

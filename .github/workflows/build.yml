name: Export preset oluştur
  run: |
    mkdir -p ~/.config/godot
    cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
    [gd_resource type="EditorSettings"]
    [resource]
    export/android/android_sdk_path = "/usr/local/lib/android/sdk"
    export/android/debug_keystore = "debug.keystore"
    export/android/debug_keystore_user = "androiddebugkey"
    export/android/debug_keystore_pass = "android"
    EOF

    cat > export_presets.cfg << 'EOF'
    [preset.0]
    name="Android"
    platform="Android"
    runnable=true
    export_path="FethiAlem.apk"
    [preset.0.options]
    architectures/arm64-v8a=true
    keystore/debug="debug.keystore"
    keystore/debug_user="androiddebugkey"
    keystore/debug_password="android"
    package/unique_name="com.fethialem.game"
    package/name="Feth-i Alem"
    EOF

name: 🎮 Build Android APK

on:
  push:
    branches: [ main, open-world-mobile-v2, feature/** ]
  pull_request:
    branches: [ main, open-world-mobile-v2 ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/tpz
          cp -r /tmp/tpz/templates/* ~/.local/share/godot/export_templates/4.3.stable/
          echo "Templates installed"
          ls ~/.local/share/godot/export_templates/4.3.stable/

      - name: Prepare Android Build
        run: |
          # Download templates again (tmp might not persist)
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O /tmp/templates2.tpz
          
          python3 << 'PYEOF'
          import zipfile
          import os
          
          # Extract android source to android folder
          with zipfile.ZipFile('/tmp/templates2.tpz', 'r') as z:
              z.extractall('/tmp/tpz2')
          
          android_zip = '/tmp/tpz2/templates/android_source.zip'
          if os.path.exists(android_zip):
              with zipfile.ZipFile(android_zip, 'r') as z:
                  z.extractall('android/')
              print("Android templates extracted successfully")
              for root, dirs, files in os.walk('android/libs'):
                  for f in files:
                      print(os.path.join(root, f))
          else:
              print("ERROR: android_source.zip not found!")
              print(os.listdir('/tmp/tpz2/templates'))
          PYEOF

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore /tmp/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Feth-i Alem"

      - name: Configure Project
        run: |
          # Disable GUT plugin for headless build
          sed -i 's|res://addons/gut/plugin.cfg||' project.godot
          
          # Update export presets with keystore (using Python for reliable sed)
          python3 << 'PYEOF'
          with open('export_presets.cfg', 'r') as f:
              content = f.read()
          
          content = content.replace('keystore/debug=""', 'keystore/debug="/tmp/debug.keystore"')
          content = content.replace('keystore/debug_user=""', 'keystore/debug_user="androiddebugkey"')
          content = content.replace('keystore/debug_password=""', 'keystore/debug_password="android"')
          
          with open('export_presets.cfg', 'w') as f:
              f.write(content)
          PYEOF
          
          echo "Export presets configured"
          grep keystore export_presets.cfg

      - name: Export APK
        run: |
          godot --headless --export-debug "Android" FethiAlem.apk

      - name: Check APK
        run: |
          if [ -f "FethiAlem.apk" ]; then
            echo "APK created successfully"
            ls -lh FethiAlem.apk
          else
            echo "APK creation failed"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FethiAlem-${{ github.sha }}
          path: FethiAlem.apk
          retention-days: 7

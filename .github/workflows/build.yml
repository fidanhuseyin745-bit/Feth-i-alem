name: Feth-i Alem APK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;34.0.0 platforms;android-34'

      - name: Install Godot 4.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/tpz
          cp /tmp/tpz/templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          JAVA_SDK_PATH="$JAVA_HOME"
          cat > ~/.config/godot/editor_settings-4.tres << SETTINGS
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$JAVA_SDK_PATH"
          export/android/debug_keystore = "/tmp/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

      - name: Import project resources
        run: godot --headless --import 2>&1 || true

      - name: Export Android APK
        run: godot --headless --export-debug "Android" FethiAlem.apk

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FethiAlem-APK
          path: FethiAlem.apk
          if-no-files-found: warn

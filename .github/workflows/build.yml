name: 🎮 Build Android APK

on:
  push:
    branches: [ main, open-world-mobile-v2, feature/** ]
  pull_request:
    branches: [ main, open-world-mobile-v2 ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"
          echo "=== Installed SDK components ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed

      - name: Install Godot
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import zipfile
          import os
          import stat
          
          url = 'https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip'
          urllib.request.urlretrieve(url, '/tmp/godot.zip')
          
          with zipfile.ZipFile('/tmp/godot.zip', 'r') as z:
              z.extractall('/tmp/')
          
          os.chmod('/tmp/Godot_v4.3-stable_linux.x86_64', stat.S_IRWXU)
          os.system('sudo mv /tmp/Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot')
          print("Godot installed")
          PYEOF

      - name: Install Export Templates
        run: |
          python3 << 'PYEOF'
          import zipfile
          import os
          import urllib.request
          
          # Download templates
          print("Downloading templates...")
          urllib.request.urlretrieve(
              'https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz',
              '/tmp/templates.tpz'
          )
          
          # Extract to export_templates folder
          target_dir = os.path.expanduser('~/.local/share/godot/export_templates/4.3.stable')
          os.makedirs(target_dir, exist_ok=True)
          
          with zipfile.ZipFile('/tmp/templates.tpz', 'r') as z:
              # Extract so that files go to 4.3.stable/templates/
              for info in z.infolist():
                  # Remove 'templates/' prefix from paths
                  if info.filename.startswith('templates/'):
                      info.filename = info.filename[10:]  # Remove 'templates/'
                      z.extract(info, target_dir)
          
          print("Templates installed")
          print("Contents of 4.3.stable:")
          for item in os.listdir(target_dir):
              print(f"  {item}")
          print("Contents of templates/ subfolder:")
          templates_dir = os.path.join(target_dir, 'templates')
          if os.path.exists(templates_dir):
              for item in os.listdir(templates_dir):
                  print(f"  templates/{item}")
          PYEOF

      - name: Prepare Android Build
        run: |
          python3 << 'PYEOF'
          import zipfile
          import os
          
          print("=== Current directory:", os.getcwd())
          
          # Create android folder if not exists
          if not os.path.exists('android'):
              print("Creating android/ folder...")
              os.makedirs('android')
          
          # android_source.zip is at 4.3.stable/ (after our extraction removes 'templates/' prefix)
          templates_dir = os.path.expanduser('~/.local/share/godot/export_templates/4.3.stable')
          android_zip = os.path.join(templates_dir, 'android_source.zip')
          
          if not os.path.exists(android_zip):
              print(f"ERROR: {android_zip} not found!")
              print("Available in 4.3.stable:", os.listdir(templates_dir) if os.path.exists(templates_dir) else "missing")
              exit(1)
          
          print(f"Found android_source.zip: {android_zip}")
          print(f"Size: {os.path.getsize(android_zip) / 1024 / 1024:.1f} MB")
          
          # Extract to android/ folder
          print("Extracting to android/ folder...")
          with zipfile.ZipFile(android_zip, 'r') as z:
              z.extractall('android/')
          print("Extraction complete!")
          
          # Verify files
          for root, dirs, files in os.walk('android/libs'):
              for f in files:
                  fpath = os.path.join(root, f)
                  size = os.path.getsize(fpath) / (1024*1024)
                  print(f"  {fpath} ({size:.1f} MB)")
          
          print("=== Android Build Ready ===")
          PYEOF

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore /tmp/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Feth-i Alem"

      - name: Configure Project
        run: |
          # Disable GUT plugin for headless build
          sed -i 's|res://addons/gut/plugin.cfg||' project.godot
          
          # Update export presets with keystore (using Python for reliable sed)
          python3 << 'PYEOF'
          with open('export_presets.cfg', 'r') as f:
              content = f.read()
          
          content = content.replace('keystore/debug=""', 'keystore/debug="/tmp/debug.keystore"')
          content = content.replace('keystore/debug_user=""', 'keystore/debug_user="androiddebugkey"')
          content = content.replace('keystore/debug_password=""', 'keystore/debug_password="android"')
          
          with open('export_presets.cfg', 'w') as f:
              f.write(content)
          PYEOF
          
          echo "Export presets configured"
          grep keystore export_presets.cfg

      - name: Export APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          echo "=== Environment ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo ""
          echo "android/libs/debug:"
          ls -la android/libs/debug/ 2>/dev/null || echo "empty"
          echo ""
          echo "android/libs/release:"
          ls -la android/libs/release/ 2>/dev/null || echo "empty"
          echo ""
          echo "export_presets.cfg:"
          grep -E "custom_template|keystore|gradle_build" export_presets.cfg
          echo ""
          echo "=== Running Godot export ==="
          godot --headless --export-debug "Android" FethiAlem.apk
          
          echo "=== Checking for APK ==="
          ls -lh FethiAlem.apk 2>/dev/null || echo "No APK generated"

      - name: Check APK
        run: |
          if [ -f "FethiAlem.apk" ]; then
            echo "APK created successfully"
            ls -lh FethiAlem.apk
          else
            echo "APK creation failed"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FethiAlem-${{ github.sha }}
          path: FethiAlem.apk
          retention-days: 7
